<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <!--El div lo centra todo-->
    <div align="center">
        <!--Ahora creo el titulo-->
        <h2>¿Cuáles son tus aficiones</h2>
        <!--Ahora creo una tabla para que el formulario tenga un borde-->
        <form>
        <table border="1" cellpadding="20">
            <tr>
                <td valign="center">
                    <!--Ahora pongo un titulo al formulario-->
                    <font color="red">
                        <h3 align="center">Selecciona las aficiones?<br>(Eslige las que precedan):</h3>
                    </font>
                    <!--Ahora pongo el formulario-->
                        <p><input type="checkbox" name="tenis">Practicar tenis</p>
                        <p><input type="checkbox" name="futbol">Practicar fúbol</p>
                        <p><input type="checkbox" name="videojuegos">Jugar a videojuegos</p>
                        <p><input type="checkbox" name="baloncesto">Jugar al baloncesto</p>
                       <p><input type="checkbox" name="natacion">Practicar natación</p>
                </td>
            </tr>
        </table>
        <!--Aqui añado tres botones, enviar, borrar y cerrar la ventana-->
    </form>
    </div>
</body>
</html>
